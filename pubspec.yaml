name: Impostor
description: "Un juego de deducción social premium estilo Champagne Gold."
publish_to: 'none'
version: 1.0.0+1

environment:
  # Se ajusta a una versión estable actual (3.11 aún no es común)
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.1.2
  font_awesome_flutter: ^10.7.0
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Herramienta para generar el icono de la app
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/fondo.png
    - assets/fondo_juego.png
    - assets/fondo_inocentes.png
    - assets/fondo_impostor.png
    - assets/icon.png

# CORRECCIÓN: La sección debe llamarse 'flutter_launcher_icons' para que funcione
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21